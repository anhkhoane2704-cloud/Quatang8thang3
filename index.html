<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gửi chút lấp lánh đến bạn ✨</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Quicksand:wght@400;600&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Quicksand', sans-serif;
            /* Nền gradient chuyển động mượt mà */
            background: linear-gradient(-45deg, #ffc3a0, #ffafbd, #fbc2eb, #a18cd1);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            height: 100vh;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .container {
            position: relative;
            width: 100%;
            height: 100%;
            z-index: 10;
        }

        .screen {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: all 1s cubic-bezier(0.68, -0.55, 0.265, 1.55);
        }

        /* Giao diện Glassmorphism (Kính mờ lấp lánh) */
        .card {
            background: rgba(255, 255, 255, 0.35);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.6);
            padding: 2.5rem;
            border-radius: 25px;
            box-shadow: 0 8px 32px 0 rgba(255, 105, 180, 0.37), inset 0 0 20px rgba(255, 255, 255, 0.5);
            text-align: center;
            max-width: 90%;
            width: 450px;
            position: relative;
            overflow: hidden;
        }

        /* Hiệu ứng viền sáng chạy quanh card */
        .card::before {
            content: '';
            position: absolute;
            top: -50%; left: -50%; width: 200%; height: 200%;
            background: conic-gradient(transparent, rgba(255,255,255,0.8), transparent 30%);
            animation: rotateLight 4s linear infinite;
            z-index: -1;
        }

        @keyframes rotateLight {
            100% { transform: rotate(360deg); }
        }

        #screen1 { z-index: 2; }
        
        #screen1 h2 {
            color: #fff;
            text-shadow: 0 2px 10px rgba(233, 30, 99, 0.5);
            margin-bottom: 25px;
            font-size: 1.6rem;
        }

        input[type="text"] {
            width: 100%; padding: 15px;
            border: none; border-radius: 15px;
            background: rgba(255, 255, 255, 0.8);
            font-size: 1.1rem; font-family: 'Quicksand', sans-serif;
            color: #d81b60; font-weight: 600;
            outline: none; margin-bottom: 20px;
            box-shadow: inset 0 2px 5px rgba(0,0,0,0.05);
            text-align: center;
        }

        input[type="text"]::placeholder { color: #ffa4b6; font-weight: 400; }

        button {
            background: linear-gradient(45deg, #ff758c 0%, #ff7eb3 100%);
            color: white; font-weight: 600; font-size: 1.2rem;
            border: none; padding: 12px 30px; border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 5px 20px rgba(255, 117, 140, 0.4);
            transition: all 0.3s ease;
            font-family: 'Quicksand', sans-serif;
            letter-spacing: 1px;
        }

        button:hover {
            transform: translateY(-3px) scale(1.05);
            box-shadow: 0 8px 25px rgba(255, 117, 140, 0.6);
        }

        #screen2 {
            z-index: 1; opacity: 0;
            transform: translateY(50px) scale(0.8);
            pointer-events: none;
        }

        #screen2 h1 {
            font-family: 'Dancing Script', cursive;
            color: #fff; font-size: 3rem; margin-bottom: 15px;
            text-shadow: 0 0 15px rgba(255, 255, 255, 0.8), 0 0 25px #ff7eb3;
        }

        #screen2 p.wish {
            color: #fff; line-height: 1.8; font-size: 1.1rem;
            margin-bottom: 25px; text-align: justify;
            text-shadow: 0 1px 5px rgba(0,0,0,0.2);
            font-weight: 600;
        }

        #screen2 p.signature {
            text-align: right; font-weight: 700;
            color: #fff; font-size: 1.2rem;
            text-shadow: 0 0 10px #ff7eb3;
        }

        /* Đốm sáng lấp lánh (Blink blink) */
        .sparkle {
            position: absolute;
            background: white;
            border-radius: 50%;
            box-shadow: 0 0 10px #fff, 0 0 20px #ffb6c1;
            animation: blink 1.5s infinite alternate;
            z-index: 1;
        }

        @keyframes blink {
            0% { opacity: 0.2; transform: scale(0.5); }
            100% { opacity: 1; transform: scale(1.5); }
        }

        /* Cánh hoa rơi */
        .petal {
            position: absolute; top: -10vh; font-size: 1.5rem;
            z-index: 5; animation: fall linear infinite;
        }

        @keyframes fall {
            0% { transform: translateY(0) rotate(0deg) scale(1); opacity: 1; }
            100% { transform: translateY(110vh) rotate(360deg) scale(0.5); opacity: 0; }
        }
    </style>
</head>
<body>
    <audio id="bgMusic" loop>
        <source src="https://assets.mixkit.co/music/preview/mixkit-romantic-acoustic-guitar-235.mp3" type="audio/mpeg">
    </audio>

    <div class="container">
        <div id="screen1" class="screen">
            <div class="card">
                <h2>Cậu tên là gì nhỉ? ✨</h2>
                <input type="text" id="nameInput" placeholder="Nhập tên của cậu vào đây..." autocomplete="off">
                <button onclick="showWish()">Mở Quà 🎁</button>
            </div>
        </div>

        <div id="screen2" class="screen">
            <div class="card">
                <h1>8/3 Rực Rỡ, <span id="displayName"></span>! ✨</h1>
                <p class="wish">
                    Nhân ngày Quốc tế Phụ nữ, chúc <span class="namePlace"></span> có một ngày thật trọn vẹn và ngập tràn yêu thương. Mong rằng không chỉ hôm nay, mà mỗi ngày trôi qua <span class="namePlace"></span> đều lấp lánh, tự tin và bình an như chính những vì sao. Hãy cứ tỏa sáng rực rỡ nhé! 💖
                </p>
                <p class="signature">- Từ Khoa -</p>
            </div>
        </div>
    </div>

    <script>
        // Tạo đốm sáng lấp lánh (Blink blink)
        function createSparkles() {
            for (let i = 0; i < 40; i++) {
                let sparkle = document.createElement('div');
                sparkle.className = 'sparkle';
                sparkle.style.left = Math.random() * 100 + 'vw';
                sparkle.style.top = Math.random() * 100 + 'vh';
                let size = Math.random() * 4 + 2; // Kích thước từ 2px - 6px
                sparkle.style.width = size + 'px';
                sparkle.style.height = size + 'px';
                sparkle.style.animationDelay = Math.random() * 2 + 's';
                sparkle.style.animationDuration = Math.random() * 1 + 1 + 's';
                document.body.appendChild(sparkle);
            }
        }

        // Tạo cánh hoa rơi
        function createPetals() {
            const emojis = ['🌸', '✨', '💖', '🌷'];
            for (let i = 0; i < 30; i++) {
                let petal = document.createElement('div');
                petal.className = 'petal';
                petal.innerHTML = emojis[Math.floor(Math.random() * emojis.length)];
                petal.style.left = Math.random() * 100 + 'vw';
                petal.style.animationDuration = (Math.random() * 4 + 4) + 's';
                petal.style.animationDelay = Math.random() * 2 + 's';
                document.body.appendChild(petal);
            }
        }

        // Khởi tạo các đốm sáng ngay từ đầu
        createSparkles();

        function showWish() {
            const inputField = document.getElementById('nameInput');
            let name = inputField.value.trim();

            if (name === "") {
                alert("Đừng vội, nhập tên của cậu đã nhé! ✨");
                inputField.focus();
                return;
            }

            // Gắn tên
            document.getElementById('displayName').innerText = name;
            document.querySelectorAll('.namePlace').forEach(el => el.innerText = name);

            // Phát nhạc
            const music = document.getElementById('bgMusic');
            music.volume = 0.6; // Âm lượng vừa phải
            music.play();

            // Hiệu ứng nổ/bay mất của màn hình 1
            const screen1 = document.getElementById('screen1');
            const screen2 = document.getElementById('screen2');

            screen1.style.transform = 'translateY(-100vh) rotate(20deg)';
            screen1.style.opacity = '0';
            
            setTimeout(() => {
                screen1.style.display = 'none';
                
                // Màn hình 2 trồi lên mượt mà
                screen2.style.pointerEvents = 'auto';
                screen2.style.opacity = '1';
                screen2.style.transform = 'translateY(0) scale(1)';
                
                // Bắt đầu rơi hoa và sao
                createPetals();
            }, 600);
        }

        // Bắt sự kiện Enter
        document.getElementById('nameInput').addEventListener('keypress', function (e) {
            if (e.key === 'Enter') showWish();
        });
    </script>
</body>
</html>
