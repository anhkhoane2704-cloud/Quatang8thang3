<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mật mã 8/3 - 11A5</title>
    <style>
        body {
            margin: 0; padding: 0; height: 100vh;
            display: flex; justify-content: center; align-items: center;
            background: radial-gradient(circle, #ffe6ea 0%, #fca3b7 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
        }

        /* Bì thư phát sáng */
        .card-container {
            position: relative; cursor: pointer;
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 10;
        }

        .card-container:hover {
            transform: scale(1.1);
            filter: drop-shadow(0 0 20px rgba(255, 77, 109, 0.6));
        }

        .envelope {
            background: linear-gradient(145deg, #ffffff, #ffe6ea);
            padding: 50px; border-radius: 20px;
            text-align: center; border: 2px dashed #ff4d6d;
        }

        /* Khung hiển thị lời chúc */
        .message-content {
            display: none;
            background: rgba(255, 255, 255, 0.95);
            padding: 40px; border-radius: 15px;
            max-width: 600px; width: 85%;
            box-shadow: 0 20px 50px rgba(0,0,0,0.2);
            border-left: 8px solid #ff4d6d;
            z-index: 20;
        }

        .message-content h2 { color: #ff4d6d; font-size: 28px; }

        /* Hiệu ứng con trỏ nhấp nháy */
        #typed-text {
            color: #333; font-size: 19px; line-height: 1.8;
            font-weight: 500; min-height: 150px;
        }
        
        .cursor {
            display: inline-block; width: 3px; height: 20px;
            background-color: #ff4d6d; margin-left: 5px;
            animation: blink 0.8s infinite; vertical-align: middle;
        }

        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }
        @keyframes fadeOut { to { opacity: 0; transform: scale(0.5); display: none; } }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
</head>
<body>

    <div class="card-container" id="envelope" onclick="openCard()">
        <div class="envelope">
            <span style="font-size: 80px; display: block;">🔒</span>
            <h1 style="color: #ff4d6d; font-size: 24px;">Hồ sơ tuyệt mật: 11A5</h1>
            <p style="color: #666;">(Chạm để giải mã)</p>
        </div>
    </div>

    <div class="message-content" id="message">
        <h2>🌸 Tải dữ liệu thành công...</h2>
        <div id="typed-text"></div><span class="cursor" id="cursor"></span>
        <p style="font-weight: bold; color: #ff4d6d; margin-top: 20px; text-align: right; opacity: 0; transition: opacity 2s;" id="signature">- Hội anh em 11A5 -</p>
    </div>

    <script>
        const textToType = "Nhân ngày Quốc tế Phụ nữ, chúc tất cả các bạn nữ lớp 11A5 luôn rạng rỡ, xinh đẹp và nạp đầy năng lượng. Cảm ơn các bạn vì đã luôn là những mảnh ghép tuyệt vời nhất của tập thể chúng ta. Chúc một ngày 8/3 thật bùng nổ và đáng nhớ nhé!";
        let index = 0;

        function typeWriter() {
            if (index < textToType.length) {
                document.getElementById("typed-text").innerHTML += textToType.charAt(index);
                index++;
                // Tốc độ gõ chữ (50ms)
                setTimeout(typeWriter, 50);
            } else {
                // Gõ xong thì hiện chữ ký
                document.getElementById("signature").style.opacity = 1;
                document.getElementById("cursor").style.display = "none";
            }
        }

        function openCard() {
            // Hiệu ứng biến mất của bì thư
            const env = document.getElementById('envelope');
            env.style.animation = 'fadeOut 0.5s forwards';
            
            setTimeout(() => {
                env.style.display = 'none';
                document.getElementById('message').style.display = 'block';
                typeWriter(); // Bắt đầu gõ chữ
            }, 500);

            // Bắn pháo hoa 2 nhịp
            var duration = 4 * 1000;
            var animationEnd = Date.now() + duration;
            var defaults = { startVelocity: 30, spread: 360, ticks: 60, zIndex: 0 };

            function randomInRange(min, max) { return Math.random() * (max - min) + min; }

            var interval = setInterval(function() {
                var timeLeft = animationEnd - Date.now();
                if (timeLeft <= 0) return clearInterval(interval);
                var particleCount = 50 * (timeLeft / duration);
                confetti(Object.assign({}, defaults, { particleCount, origin: { x: randomInRange(0.1, 0.3), y: Math.random() - 0.2 } }));
                confetti(Object.assign({}, defaults, { particleCount, origin: { x: randomInRange(0.7, 0.9), y: Math.random() - 0.2 } }));
            }, 250);
        }
    </script>
</body>
</html>
